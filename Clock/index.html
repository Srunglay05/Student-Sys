<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analog Clock</title>

  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>
<body>
<div class="container">
  <!-- Header -->
  <header class="topbar">
    <!-- Left -->
    <div class="brand">
      <div class="brand__name">Cambodia</div>
      <div class="brand__tag">Phnom Penh</div>
    </div>
    <!-- Center -->
    <div class="readout">
      <div id="digital-time" class="readout__time">--:--:--</div>
      <div id="digital-date" class="readout__date">----</div>
    </div>
    <!-- Right -->
    <div class="controls">
      <div class="theme-switch">
        <button class="theme-btn" data-theme="ocean">Ocean</button>
        <button class="theme-btn" data-theme="sunset">Sunset</button>
        <button class="theme-btn" data-theme="forest">Forest</button>
      </div>
      <div class="mode-switch">Dark Mode</div>
    </div>
  </header>
  <!-- Clock -->
  <div class="clock">
    <!-- Numbers -->
    <label style="--i:1"><span>1</span></label>
    <label style="--i:2"><span>2</span></label>
    <label style="--i:3"><span>3</span></label>
    <label style="--i:4"><span>4</span></label>
    <label style="--i:5"><span>5</span></label>
    <label style="--i:6"><span>6</span></label>
    <label style="--i:7"><span>7</span></label>
    <label style="--i:8"><span>8</span></label>
    <label style="--i:9"><span>9</span></label>
    <label style="--i:10"><span>10</span></label>
    <label style="--i:11"><span>11</span></label>
    <label style="--i:12"><span>12</span></label>
    <!-- Hands -->
    <div class="indicator">
      <span class="hand hour"></span>
      <span class="hand minute"></span>
      <span class="hand second"></span>
    </div>
  </div>
</div>
</body>
</html>
